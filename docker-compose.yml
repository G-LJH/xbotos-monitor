services:
  robot-monitor:
    build: .
    container_name: robot-monitor
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - MONITOR_AUTO_START=${MONITOR_AUTO_START:-true}
      - CONFIG_PATH=/app/data/config.json
      # 阿里云短信配置（可选，也可在 config.json 中配置）
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID:-}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET:-}
      - ALIYUN_SMS_SIGN_NAME=${ALIYUN_SMS_SIGN_NAME:-机器人监控}
      - ALIYUN_SMS_TEMPLATE_CODE=${ALIYUN_SMS_TEMPLATE_CODE:-SMS_XXXXXXX}
      - ALIYUN_SMS_PHONE_NUMBERS=${ALIYUN_SMS_PHONE_NUMBERS:-}
